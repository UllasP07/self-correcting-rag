# Prometheus scrape config for the RAG service (Milestone 8).
# The app runs on the HOST (python -m src.rag.server on :8000); Prometheus in
# its container reaches it via host.docker.internal.
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: rag
    static_configs:
      - targets: ["host.docker.internal:8000"]
